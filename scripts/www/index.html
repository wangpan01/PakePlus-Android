    /* 左侧圆形组：缓慢上下浮动 */
    @keyframes circle-float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-18px); }
      100% { transform: translateY(0px); }
    }

    /* 右上角太阳：脉冲缩放 + 轻微浮动 */
    @keyframes sun-pulse {
      0%   { transform: scale(1)    translateY(0px);  opacity: 1; }
      40%  { transform: scale(1.06) translateY(-8px); opacity: 0.85; }
      100% { transform: scale(1)    translateY(0px);  opacity: 1; }
    }

    /* 底部山脉：极缓慢横向漂移 */
    @keyframes mountain-drift {
      0%   { transform: translateX(0px); }
      50%  { transform: translateX(-30px); }
      100% { transform: translateX(0px); }
    }

    @keyframes bamboo-sway {
      0%   { transform: rotate(0deg)      translateX(0px); }
      20%  { transform: rotate(0.8deg)    translateX(4px); }
      50%  { transform: rotate(-0.6deg)   translateX(-3px); }
      75%  { transform: rotate(0.4deg)    translateX(2px); }
      100% { transform: rotate(0deg)      translateX(0px); }
    }

    @keyframes bamboo-leaf-drift {
      0%   { transform: rotate(0deg)    translateX(0px); }
      30%  { transform: rotate(-1deg)   translateX(-5px); }
      60%  { transform: rotate(0.7deg)  translateX(3px); }
      100% { transform: rotate(0deg)    translateX(0px); }
    }

    /* Z字云纹：缓慢左右漂移 */
    @keyframes cloud-drift {
      0%   { transform: translateX(0px); }
      50%  { transform: translateX(60px); }
      100% { transform: translateX(0px); }
    }

<script>
(function () {
  var stage = document.getElementById('stage');
  var inner = document.getElementById('inner');
  var bgm = document.getElementById('bgm');
  if (bgm) bgm.volume = 0.2;
  var DESIGN_W = 3840;
  var DESIGN_H = 1245;

  function resize() {
    var sw = stage.clientWidth;
    var sh = stage.clientHeight;
    var scale = Math.min(sw / DESIGN_W, sh / DESIGN_H);
    inner.style.transform = 'scale(' + scale + ')';
    inner.style.left = ((sw - DESIGN_W * scale) / 2) + 'px';
    inner.style.top  = ((sh - DESIGN_H * scale) / 2) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  // 默认自动播放；若被浏览器策略拦截，则在首次用户交互后补播
  function tryPlayBgm() {
    if (!bgm) return;
    var playPromise = bgm.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(function () {});
    }
  }
  tryPlayBgm();
  ['pointerdown', 'keydown', 'touchstart'].forEach(function (evt) {
    document.addEventListener(evt, tryPlayBgm, { once: true });
  });

  /* ── 人物数据 ── */
  var PEOPLE = {
    '阡能':  { category:'本籍', intro:'<p>阡能（？～882年），大邑安仁（原邛州安仁县）人，唐末农民起义军首领。唐中和二年（882年）三月，阡能因不满朝廷沉疴，聚众起义，活动于邛、雅二州。起义军在阡能统率下，迅速发展壮大，官军屡战屡败。同年十一月，唐军将领高仁厚使用“剿抚”手段，分化和打击起义军。在战斗中，阡能、罗浑擎等起义军主要领导人先后被杀，起义宣告失败。阡能的起义，在西川点燃了打击李唐王朝的第一把火，引发各地义军竞起，对李唐统治给予了沉重打击。</p>' },
    '计有功': { category:'本籍', intro:'<p>计有功，大邑安仁（原邛州安仁县）人，名敏夫，号灌园居士，计用章之孙，生于元祐年间（1086～1093年），大观年间（1107～1110年）进士，南宋文学家。计有功晚年将收集的唐诗资料编辑成巨著《唐诗纪事》，共81卷，被《四库全书》收于集部诗文评类，对保存我国优秀文化作出了巨大贡献。</p><p class="intro-note">注：计用章，宋天禧三年（1019年）己未科进士。其子计良辅（计有功之父），为绍兴元年（1131年）辛亥科进士。故有“一门三进士”之说。</p>' },
    '岳春':  { category:'本籍', avatar:'image/image_01.png', intro:'<p>岳春，原名乐春，字雪吟，又名春阳，生于清道光年间，大邑县城北乐家坝人。中年入梨园学艺，川剧的“昆、高、胡、弹、灯”五匹齐美，造诣精湛，是清末民初川剧界的著名丑角，被称为“戏中状元”。乐春擅长表演功夫戏，并创造了“矮子身法”，对川剧表演程式进行革新、改造，创造出曹操脸谱12种。其代表作品有《渔父赠剑》《赠绨袍》《做文章》《坠马》《秋江》《活捉三郎》《御河桥》等。</p>' },
    '伍肇龄': { category:'本籍', intro:'<p>伍肇龄（1829～1915年），字嵩生（一作崧生），大邑䢺江镇钱沟人，12岁考上秀才，15岁中举。道光二十七年（1847年）丁未科进士，时年18岁，入翰林院散馆任编修，人称“伍翰林”。曾任光绪皇帝的老师，又名“太师”。清咸丰十一年（1861年），因其为肃顺座上客而被株连，削籍为民。伍嵩生回乡后，先后在邛崃书院、成都潜溪书院、锦江书院、尊经书院讲学。1910年，四川总督府拨款，伍嵩生领衔修复成都名胜望江楼。清宣统三年五月（1911年6月），伍嵩生参加四川保路同志会组织的请愿，并走在前列。伍嵩生著作现仅存《石室诗钞》一书。</p>' },
    '冷融':  { category:'本籍', intro:'<p>冷融（1895～1943年），字杰生，大邑灌口场（今悦来镇）人。1921年到日本明治大学攻读政治经济科，1924年毕业回乡。先后担任过邛州县立联合中学校长、四川军务帮办公署驻渝代表、二十四军驻南京代表、蒙藏委员会常委、四川省政府委员兼民政厅长。他先后捐钱在灌口场、王泗、新场、䢺江修建完全小学。1928年，他参与倡导创办大邑第一所中学。</p>' },
    '杨歗谷': { category:'本籍', avatar:'image/image_03.png', intro:'<p>杨歗谷（1885～1969年）又作“杨啸谷”，又名虓（xiao），大邑晋原街道凤凰村人。清末毕业于四川武备学堂，在日本游历回国后从事收藏与考古，担任过北京京华美专教授、国立北京艺术专科学校专职教员兼图书馆主任。著有《东瀛考古记》《古月轩瓷考》《东方陶瓷史》《大同云冈石佛考》。1941年在《立言画刊》连载《碑帖刻人姓名考》。杨歗谷年老回川，自号竹扉老人，受聘在华西协合大学教授考古学和中国美术史。新中国成立后，先后担任四川省博物馆、四川省文史馆研究员。</p>' },
    '叶心清': { category:'本籍', avatar:'image/image_05.png', intro:'<p>叶心清（1908～1969年），又名枝富，大邑韩场人。7岁入学，后拜师名医魏廷兰。他医术高绝，善用金针治疗疾病，被誉为东方神医，曾为党和国家领导人刘少奇、周恩来、朱德、陈毅、彭德怀、聂荣臻、李富春、邓子恢、蔡畅等进行医疗保健，多次被派出国为其他国家领导人治病。1964年获越南政府友谊勋章。他曾担任重庆市第一届人民代表大会代表、全国政协第四届委员会委员。</p>' },
    '冷寅东': { category:'本籍', intro:'<p>冷寅东（1894～1982年），又名庭桂，字薰南，大邑灌口场（今悦来镇）人。清宣统三年（1911年）夏，四川保路同志会成立，冷寅东经同盟会会员朱之宏、曹权实介绍参加革命活动。推翻清王朝后，冷寅东进入四川军政府办的陆军军官学校，成为第一期学员。先后参加讨袁（世凯）战争、护国战争和护法战争，后成为刘文辉部将。1949年4月，冷寅东被任命为成都市长。1949年12月25日，他率领人员起义。解放后，冷寅东历任川西区各界人民代表会议代表、川西行署委员、四川省政府委员兼江津区副专员、四川省政协常委、全国政协第五届委员。</p>' },
    '张陵': { category:'客籍', avatar:'image/image_06.jpg', intro:'<p>张陵（34～156年），又名张道陵，字辅汉，汉留侯张良的八世孙，沛国丰（今江苏省丰县）人。因创立道教，道徒尊称为张道陵。张道陵于东汉顺帝时来到大邑鹤鸣山修道。东汉永和六年（141年）作道书24篇，在鹤鸣山创立道派，奉李耳为教主，为道教之始。入道者要出五斗米，故称五斗米道。道徒尊称他为天师，故道教又称天师道。他把人们组织起来，划分为24个教区，即24治。教区内废除官吏，设祭酒管理政教事务，用《道德经》教化民众，废除刑罚，让有过错的人修桥补路。规定祭祀不用酒肉，还设立义舍义仓，救济路人与贫苦道友。</p>' },
    '杜甫':  { category:'客籍', avatar:'image/image_07.jpg', intro:'<p>杜甫（712～770年），字子美，自号少陵野老，唐代著名诗人，被后人誉为“诗圣”。唐乾元二年（759年）冬天，杜甫为避“安史之乱”，携家带口由陇右（今甘肃省南部）入蜀辗转来到成都。在成都期间，杜甫创作240余首诗，其中有多首诗咏赞大邑以及西岭雪山，如《绝句》《咏大邑瓷器》等。</p><p class="poem-title">绝句（唐  杜甫）</p><p class="poem-line">两个黄鹂鸣翠柳，一行白鹭上青天；窗含西岭千秋雪，门泊东吴万里船。</p>' },
    '文同':  { category:'客籍', avatar:'image/image_08.png', intro:'<p>文同（1018～1079年），字与可，号笑笑居士、笑笑先生，人称石室先生。梓州梓潼郡永泰县（今绵阳市盐亭县）人。北宋官员，著名画家、诗人。他曾代理大邑县令，足迹遍至鹤鸣山、雾中山、高堂山、飞凤山等，留下诗文，曾赋《高堂山兜率寺》《题兜率寺》《题雾中山碧玉潭》等诗。</p><p class="poem-title">县楼独酌（北宋 文同）</p><p class="poem-line">向晚无公事，身如太古闲。县楼明夕照，樽酒对南山。</p><p class="poem-line">放意利名外，游心天地间。生来不能饮，到此学酡颜。</p><p class="poem-title">题凤凰山后岩（北宋 文同）</p><p class="poem-line">此景又奇绝，半空生曲栏。蜀尘随眼断，蕃雪满襟寒。</p><p class="poem-line">涧下雨声急，岩头云色乾。归鞍休报晚，吾待且盘桓。</p>' },
    '陆游':  { category:'客籍', avatar:'image/image_09.png', intro:'<p>陆游（1125～1210年），字务观，号放翁，越州山阴（今浙江省绍兴市）人，南宋时期文学家、史学家、爱国诗人。陆游在成都、蜀州（今崇州市）居住期间，曾两次来大邑，留下诗词18首，如《题平云亭》《高秋亭》《夜宿鹄鸣山》《九日试雾中僧所赠茶》《九月三日同吕周辅教授游大邑诸山》等。</p><p class="poem-title">题平云亭（南宋 陆游）</p><p class="poem-line">满榼香醪何处倾，金鳌背上得同行。天垂绿野三边尽，云与朱阑一样平。</p><p class="poem-line">烟树微茫疑误墨，风松萧瑟有新声。黄花未吐无多恨，也胜湘累拾落英。</p><p class="poem-title">高秋亭（南宋 陆游）</p><p class="poem-line">三日山中醉复醒，径归回首愧山灵。从今借取观书眼，长看天西万叠青。</p><p class="poem-title">安仁道中二首（南宋 陆游）</p><p class="poem-sub">其一</p><p class="poem-line">千古临邛路，飘然独偶游。病身那迫老，远客更禁秋。</p><p class="poem-line">水退桥未葺，渡闲船自流。飞腾付年少，回首思悠悠。</p><p class="poem-sub">其二</p><p class="poem-line">三驿未为远，衰翁愁出门。食程多卒卒，失睡每昏昏。</p><p class="poem-line">天大围平野，江回隔近村。何时有余俸，小筑占云根。</p><p class="poem-title">夜宿鹄鸣山（南宋 陆游）</p><p class="poem-line">西游万里已关天，采药名山亦宿缘。老柏干霄如许寿，幽花泣露为谁妍。</p><p class="poem-line">苔黏石磴扪萝上，灯耿云房扫榻眠。安得仙翁索米术，一生留此弄寒泉。</p>' },
    '张三丰': { category:'客籍', avatar:'image/image_10.png', intro:'<p>张三丰，名君实，又名全一，号昆阳、元元，因不修边幅，又号张邋遢。元末明初著名道士，武当道派的实际开创者，又是气功大师和武术名家。明洪武二十五年（1392年），入蜀慕其祖道陵得道之所，来大邑县鹤鸣山入天谷洞炼丹。至洪武末（1398年），又先后来此两次，留有鹤鸣山、天谷洞等诗。</p><p class="poem-title">鹤鸣山二首（明 张三丰）</p><p class="poem-line">（其一）沽酒临邛入翠微，穿崖客负白云归。逍遥廿四神仙洞，石鹤欣然啸欲飞。</p><p class="poem-line">（其二）道士来时石鹤鸣，飞神天谷署长生。只今两涧潺湲水，助我龙吟虎啸声。</p>' },
    '宋载':  { category:'客籍', intro:'<p>宋载，字大舟，号西瑜，浙江建德人，拔贡。清乾隆十一年（1746年）任大邑县知县。宋载上任后，遍寻大邑旧志无所获，于是决心新编《大邑县志》。历经6年，成书4卷，并为“大邑古八景”写诗作赋。宋载纂修的《大邑县志》是大邑现存最早的志书，为大邑留下了宝贵的历史文化财富。</p><p class="poem-title">晋原八景（清 宋载）</p><p class="poem-sub">（凤凰鲸柏）</p><p class="poem-line">紫柏森森不计年，凤凰遥度暮山烟。公余拾翠因相问，几辈骑鲸得上天。</p><p class="poem-sub">（虎跳泏河）</p><p class="poem-line">跳波谁把迹曾留，泏水闲寻虎渡头。暇日到来吟兴远，一鞭人影暮烟秋。</p><p class="poem-sub">（雾中山月池）</p><p class="poem-line">明月何年入此池，四围山色影琉璃。飞觞怕阻诗人兴，莫怪嫦娥出浴迟。</p><p class="poem-sub">（鹤鸣双涧）</p><p class="poem-line">雨涧泉流不断声，泠泠潄玉耳边清。我来何处寻仙迹，夜静山空双鹤鸣。</p><p class="poem-sub">（斜江晚渡）</p><p class="poem-line">一湾春水漾前川，晚渡无人半系船。却向斜江见图画，渔家多处绿杨烟。</p><p class="poem-sub">（洞口烟霞）</p><p class="poem-line">人家几处抱清流，洞口风花香暗浮。水浸霞红烟带绿，诗囊添得宦中游。</p><p class="poem-sub">（甘泉笻竹）</p><p class="poem-line">槭槭微风缕缕烟，幽篁次第溯甘泉。昔经汉使遗栽后，曾说新枝与岁迁。</p><p class="poem-sub">（高堂圣灯）</p><p class="poem-line">旧是传灯佛子宫，一山高耸燄熊熊。夜来取次凭虚望，误认明星荡碧空。</p>' }
  };

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** 诗题末尾全角括号内为副题，不加粗；无匹配则整题加粗 */
  function formatPoemTitles(bodyEl) {
    if (!bodyEl) return;
    var nodes = bodyEl.querySelectorAll('.poem-title');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var text = el.textContent.replace(/\s+$/, '').trim();
      var m = text.match(/^(.+?)（([^）]+)）$/);
      if (m) {
        el.innerHTML =
          '<span class="poem-title-main">' +
          escapeHtml(m[1]) +
          '</span><span class="poem-title-meta">（' +
          escapeHtml(m[2]) +
          '）</span>';
      } else {
        el.innerHTML = '<span class="poem-title-main">' + escapeHtml(text) + '</span>';
      }
    }
  }

  function setMainVisible(visible) {
    var frame = document.getElementById('0_5');
    var bg    = document.getElementById('popup-bg');
    if (visible) {
      frame.style.display = '';
      bg.style.display    = 'none';
    } else {
      frame.style.display = 'none';
      bg.style.display    = 'block';
    }
  }

  window.openPopup = function (name) {
    var data = PEOPLE[name];
    if (!data) return;

    document.getElementById('popup-name').textContent = name;
    var bodyEl = document.getElementById('popup-body');
    bodyEl.innerHTML = data.intro;
    formatPoemTitles(bodyEl);

    var avatarWrap = document.getElementById('popup-avatar-wrap');
    var avatar     = document.getElementById('popup-avatar');
    var scrollBg   = document.getElementById('popup-scroll-bg');

    // 选择背景图：有头像用 tx.png，无头像本籍用 bj.png，无头像客籍用 kj.png
    if (data.avatar) {
      scrollBg.src = 'image/tx.png';
      avatar.alt = name + '头像';
      avatar.src = data.avatar;
      avatar.onerror = function () { avatarWrap.style.display = 'none'; };
      avatarWrap.style.display = 'block';
    } else {
      scrollBg.src = data.category === '本籍' ? 'image/bj.png' : 'image/kj.png';
      avatar.removeAttribute('src');
      avatarWrap.style.display = 'none';
    }

    document.getElementById('popup-body-scroll').scrollTop = 0;
    setMainVisible(false);
    var layer = document.getElementById('popup-layer');
    layer.style.display = 'block';
    layer.classList.remove('show');
    void layer.offsetWidth;
    layer.classList.add('show');
  };

  window.closePopup = function () {
    document.getElementById('popup-layer').style.display = 'none';
    setMainVisible(true);
  };

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closePopup();
  });
})();
</script>
